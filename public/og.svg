    <pattern id="noise" width="160" height="160" patternUnits="userSpaceOnUse">
      <rect width="160" height="160" fill="transparent"/>
      <path d="M0 80h160M80 0v160" stroke="#d4a64a" stroke-opacity="0.025"/>
      <circle cx="28" cy="34" r="1" fill="#fbf3dc" fill-opacity="0.06"/>
      <circle cx="114" cy="92" r="1" fill="#fbf3dc" fill-opacity="0.045"/>
      <circle cx="76" cy="126" r="1" fill="#fbf3dc" fill-opacity="0.035"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#felt)"/>
  <rect width="1200" height="630" fill="url(#noise)"/>
  <rect x="58" y="54" width="1084" height="522" rx="28" fill="none" stroke="#d4a64a" stroke-opacity="0.26"/>
  <path d="M96 142h132M972 142h132" stroke="url(#gold)" stroke-width="2" opacity="0.7"/>

  <g filter="url(#shadow)" transform="translate(810 130) rotate(8)">
    <rect x="0" y="0" width="156" height="226" rx="16" fill="#f4ede1" stroke="#d4a64a" stroke-width="4"/>
    <text x="28" y="50" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#0b1410">A</text>
    <text x="28" y="82" font-family="Georgia, serif" font-size="34" fill="#c0322a">♥</text>
    <text x="78" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="84" fill="#c0322a">♥</text>
  </g>
  <g filter="url(#shadow)" transform="translate(935 205) rotate(-7)">
    <rect x="0" y="0" width="156" height="226" rx="16" fill="#f4ede1" stroke="#d4a64a" stroke-width="4"/>
    <text x="28" y="50" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#0b1410">K</text>
    <text x="28" y="82" font-family="Georgia, serif" font-size="34" fill="#0b1410">♠</text>
    <text x="78" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="84" fill="#0b1410">♠</text>
  </g>

  <text x="96" y="146" font-family="Cinzel, Georgia, serif" font-size="28" letter-spacing="12" fill="#ecd596">THE CARD GAME</text>
  <text x="92" y="292" font-family="Cinzel, Georgia, serif" font-size="112" fill="#fbf3dc">Cambio</text>
  <text x="100" y="364" font-family="Georgia, serif" font-size="44" font-style="italic" fill="#ecd596">The lowest hand wins.</text>
  <text x="100" y="446" font-family="Inter, Arial, sans-serif" font-size="30" fill="#f4ede1" opacity="0.86">Rules, example game, cheat sheet, and history.</text>
  <text x="100" y="506" font-family="Inter, Arial, sans-serif" font-size="24" fill="#ecd596" opacity="0.85">cambio-game.com</text>
