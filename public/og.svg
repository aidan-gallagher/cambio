<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="felt" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#173025"/>
      <stop offset="58%" stop-color="#0b1410"/>
      <stop offset="100%" stop-color="#050b08"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf3dc"/>
      <stop offset="0.42" stop-color="#ecd596"/>
      <stop offset="1" stop-color="#b8862b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
